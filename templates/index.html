<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Crypto App</title>
    <style>
        body { background: #050816; color: white; font-family: Inter, Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; }
        .box { text-align: center; max-width: 520px; padding: 40px; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 24px; background: rgba(15, 23, 42, 0.95); }
        h1 { margin: 0 0 24px; color: #7dd3fc; }
        p { color: #cbd5e1; line-height: 1.6; }
        .actions { margin-top: 32px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
        a { padding: 14px 20px; border-radius: 12px; text-decoration: none; color: white; font-weight: 700; background: #2563eb; }
        a.secondary { background: #16a34a; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Crypto Trading Dashboard</h1>
        <p>Sign in to manage your crypto balance, trade coins, and view your dashboard in real time.</p>
        <div class="actions">
            <a href="/login">Login</a>
            <a class="secondary" href="/register">Register</a>
        </div>
    </div>
</body>
</html>
