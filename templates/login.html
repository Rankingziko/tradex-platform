<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        body { background: #050b16; color: white; font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .auth-box { width: 100%; max-width: 420px; margin: auto; padding: 28px; background: #111; border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.45); }
        h1 { margin-bottom: 18px; font-size: 1.9rem; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .error { color: #f87171; margin-bottom: 16px; }
        a { color: #7dd3fc; text-decoration: none; }
        p { margin-top: 18px; font-size: 0.95rem; }
        @media (max-width: 480px) {
            .auth-box { padding: 22px; }
            input, button { padding: 12px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="auth-box">
    <h1>Login</h1>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/login" method="POST">
        <input type="text" name="email" placeholder="Email or username" value="{{ identifier or '' }}" autocomplete="username" required>
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Register</a></p>
</div>
</body>
</html>
