services:
  - type: web
    name: tradex-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    branch: main
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: development
      - key: CLIENT_URL
        value: http://localhost:3000
      - key: USE_FILE_DB
        value: "true"
      - key: JWT_SECRET
        value: tradex_super_secret_key_change_in_production_2025
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        value: your-email@gmail.com
      - key: EMAIL_PASS
        value: your-app-password
      - key: BINANCE_API_KEY
        value: your_binance_api_key
      - key: BINANCE_API_SECRET
        value: your_binance_api_secret
      - key: MAX_FILE_SIZE
        value: "5000000"
      - key: UPLOAD_PATH
        value: ./uploads
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
